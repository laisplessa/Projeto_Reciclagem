<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ancizar+Sans:ital,wght@0,100..1000;1,100..1000&family=Anton&family=Cormorant+SC:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Righteous&family=Roboto:ital,wght@0,100..900;1,100..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Pontos de Coleta</title>
    <style>
        
        * {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background-color: #D4E6CC;
        }
        
        header {
            background-color: #9CD285;
        }

        .top-menu {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 2rem;
            margin-left: 20px;
            font-weight: 500;
        }

        .top-menu p {
            user-select: none;
            cursor: pointer;
            
        }

        nav a {
            margin: 15px;
            text-decoration: none;
            color: black;
            user-select: none;
            cursor: pointer;
            transition: .6s linear;
            border-radius: 5px;
            padding: 0.6rem;
        }

        nav a:hover {
            background-color: #7caf66;
        }
        .container{
            padding-top: 5%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            
        }

        .container h1 {
            font-size: 2.5rem;
        }

        .container p{
            color: #000000BF;
            font-size: 1.2rem;
            margin-bottom: 60px;
        }
        
        .group-selection-bairro {
            display: flex;
            flex-direction: column;
            width: min-content;
            justify-content: center;
            align-items: center;
        }
        .group-selection-tipo-produto {
            display: flex;
            flex-direction: column;
            width: min-content;
            justify-content: center;
            align-items: center;
        }

        .principal-group {
            display: flex;
            gap: 3rem;
            justify-content: center;
        }

        .principal-group label {
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            font-size: 12px;
        }

        .principal-group select {
            background-color: #FFFFFF;
            outline: none;
            margin: 5px;
        }

        .group-selection-bairro select {
            appearance: none; /* remove estilo padrão */
            -webkit-appearance: none;
            -moz-appearance: none;
            padding: 15px;
            
            background-image: url("https://cdn-icons-png.flaticon.com/512/32/32195.png");
            background-repeat: no-repeat;
            background-position: right 10px center; /* seta no canto direito */
            background-size: 8px;
        }


        .group-selection-tipo-produto select {
            appearance: none; /* remove estilo padrão */
            -webkit-appearance: none;
            -moz-appearance: none;
            padding: 15px;
            
            background-image: url("https://cdn-icons-png.flaticon.com/512/32/32195.png");
            background-repeat: no-repeat;
            background-position: right 10px center; /* seta no canto direito */
            background-size: 8px;
        }

        .principal-group option {
            
        }
        
    </style>
</head>
<body>
    <header>
        <div class="top-menu">
            <p onclick="location.reload()">Recicla Joinville</p>
            <nav>
                <a>Home</a>
                <a>Pontos de Coleta</a>
                <a>Solicitar Coleta</a>
                <a>Denúncias</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            
            
        </div>
    </main>
</body>
</html>
