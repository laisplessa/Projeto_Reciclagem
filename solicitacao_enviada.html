<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitação Enviada</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="img/solicitar.png" type="image/x-icon">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            background-color: #d4e6cc;
            overflow: hidden;
        }

        .bg-circle {
            position: fixed;
            border-radius: 50%;
            opacity: 0.18;
            animation: float 6s ease-in-out infinite;
        }
        .bg-circle-1 { width: 500px; height: 500px; background: #427142; top: -150px; left: -150px; animation-delay: 0s; }
        .bg-circle-2 { width: 350px; height: 350px; background: #5a9e5a; bottom: -100px; right: -80px; animation-delay: 2s; }
        .bg-circle-3 { width: 200px; height: 200px; background: #2d5a2d; top: 60%; left: 10%; animation-delay: 4s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .card {
            position: relative;
            z-index: 10;
            background: white;
            border-radius: 28px;
            padding: 56px 64px;
            text-align: center;
            max-width: 480px;
            width: 90%;
            animation: cardIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: scale(0.7) translateY(30px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .icon-wrap {
            width: 88px;
            height: 88px;
            background: #eaf4e4;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            animation: iconPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s both;
        }

        @keyframes iconPop {
            from { transform: scale(0) rotate(-180deg); }
            to   { transform: scale(1) rotate(0deg); }
        }

        .icon-wrap svg {
            width: 44px;
            height: 44px;
        }

        .tag {
            display: inline-block;
            background: #eaf4e4;
            color: #427142;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 5px 14px;
            border-radius: 99px;
            margin-bottom: 18px;
            animation: fadeUp 0.5s ease 0.8s both;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            color: #1a2e1a;
            line-height: 1.3;
            margin-bottom: 12px;
            animation: fadeUp 0.5s ease 0.9s both;
        }

        p {
            font-size: 14.5px;
            color: #666;
            line-height: 1.7;
            margin-bottom: 36px;
            animation: fadeUp 0.5s ease 1s both;
        }

        .btn {
            display: inline-block;
            background: #427142;
            color: white;
            text-decoration: none;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 600;
            padding: 14px 36px;
            border-radius: 12px;
            cursor: pointer;
            border: none;
            transition: background 0.2s, transform 0.15s;
            animation: fadeUp 0.5s ease 1.1s both;
        }

        .btn:hover { background: #2d5a2d; transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .divider {
            width: 48px;
            height: 3px;
            background: #9cd285;
            border-radius: 99px;
            margin: 0 auto 24px;
            animation: fadeUp 0.5s ease 0.85s both;
        }
    </style>
</head>
<body>
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
    <div class="bg-circle bg-circle-3"></div>

    <div class="card">
        <div class="icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="#427142" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 6L9 17l-5-5"/>
            </svg>
        </div>
        <span class="tag">Agendado</span>
        <div class="divider"></div>
        <h1>Solicitação enviada com sucesso!</h1>
        <p>Sua solicitação de coleta foi registrada. Em breve nossa equipe entrará em contato para confirmar o agendamento.</p>
        <a href="index.html" class="btn">Voltar ao início</a>
    </div>
</body>
</html>
